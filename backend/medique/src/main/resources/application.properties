spring.application.name=medique


# =============================================
# MediQueue - Spring Boot Application Config
# =============================================

# Server
server.port=8080

# =============================================
# MySQL Database Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/mediqueue_db
spring.datasource.username=root
spring.datasource.password=Anu@#$1908
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT Configuration
# =============================================
# Secret key (min 256-bit / 32 chars for HS256 — change in production!)
jwt.secret=mediQueueSecretKey2024_ChangeThisInProductionPlease!!
jwt.expiration=86400000
# 86400000 ms = 24 hours

# =============================================
# File Upload (for hospital documents)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/

# =============================================
# Logging
# =============================================
logging.level.com.mediqueue=DEBUG
logging.level.org.springframework.security=INFO

# =============================================
# CORS (allow React Native calls)
# =============================================
