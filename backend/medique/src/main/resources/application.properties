spring.application.name=medique

# =============================================
# MediQueue - Spring Boot Application Config
# =============================================

# Server
server.port=8080

# =============================================
# MySQL Database Configuration
# =============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mediqueue_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT Configuration
# =============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =============================================
# File Upload (for hospital documents)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/

# =============================================
# Logging
# =============================================
logging.level.com.mediqueue=DEBUG
logging.level.org.springframework.security=INFO

# =============================================
# Twilio OTP SMS & Verify Configuration
# =============================================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID}

# =============================================
# Razorpay Keys
# =============================================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}